<div id="form-wrapper" class="max-w-xl mx-auto mt-8 bg-purple-950/20 p-6 rounded-xl border border-purple-900/40">
    
    <form id="contact-form" class="space-y-6">
        <input type="hidden" name="access_key" value="58dcaeef-a959-410c-9896-1fc418aa1980">

        <div>
            <label for="name" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Name</label>
            <input type="text" name="name" id="name" required placeholder="Your Name" 
                   class="w-full bg-[#161026] text-slate-100 placeholder-slate-600 border border-purple-900/40 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-purple-500 transition">
        </div>

        <div>
            <label for="email" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Email Address</label>
            <input type="email" name="email" id="email" required placeholder="you@example.com" 
                   class="w-full bg-[#161026] text-slate-100 placeholder-slate-600 border border-purple-900/40 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-purple-500 transition">
        </div>

        <div>
            <label for="message" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Message</label>
            <textarea name="message" id="message" rows="5" required placeholder="Your message..." 
                      class="w-full bg-[#161026] text-slate-100 placeholder-slate-600 border border-purple-900/40 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-purple-500 transition resize-none"></textarea>
        </div>

        <div class="flex justify-start">
            <div class="cf-turnstile" data-sitekey="0x4AAAAAADvv6XQYXY40CBYQ"></div>
        </div>

        <button type="submit" id="submit-btn"
                class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold uppercase text-xs tracking-widest py-4 px-6 rounded-lg transition duration-150 ease-in-out cursor-pointer shadow-lg shadow-purple-950/50">
            Send Message
        </button>
    </form>
</div>

<script>
const form = document.getElementById('contact-form');
const wrapper = document.getElementById('form-wrapper');
const button = document.getElementById('submit-btn');

form.addEventListener('submit', function(e) {
    e.preventDefault(); // Stops the default page redirect
    
    button.innerText = "Sending...";
    button.disabled = true;

    const formData = new FormData(form);
    const object = Object.fromEntries(formData);
    const json = JSON.stringify(object);

    fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        },
        body: json
    })
    .then(async (response) => {
        if (response.status == 200) {
            // Replaces the form layout entirely with a clean text block matching your theme
            wrapper.innerHTML = `
                <div class="text-center py-8">
                    <h3 class="text-xl font-bold text-purple-400 uppercase tracking-wider mb-2">Message Sent!</h3>
                    <p class="text-sm text-slate-300">Thanks for reaching out. Your review message has bypassed the lineup and landed straight in my inbox.</p>
                </div>
            `;
        } else {
            button.innerText = "Error, try again";
            button.disabled = false;
        }
    })
    .catch(error => {
        console.log(error);
        button.innerText = "Error, try again";
        button.disabled = false;
    });
});
</script>
