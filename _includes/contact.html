<style>
    .custom-form-container {
        max-width: 500px;
        margin: 20px auto;
        font-family: sans-serif;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
    .form-group input, 
    .form-group textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    .submit-btn {
        background-color: #007bff;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        width: 100%; /* Makes button full width */
    }
    .submit-btn:hover {
        background-color: #0056b3;
    }
</style>

<div class="custom-form-container">
    <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="58dcaeef-a959-410c-9896-1fc418aa1980">

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" name="name" id="name" required placeholder="Your Name">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" name="email" id="email" required placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea name="message" id="message" rows="5" required placeholder="Your message..."></textarea>
        </div>

        <div class="cf-turnstile" data-sitekey="0x4AAAAAADvv6XQYXY40CBYQ"></div>

        <button type="submit" class="submit-btn">Send Message</button>
    </form>
</div>
