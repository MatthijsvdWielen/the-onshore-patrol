<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Onshore Patrol | {{ page.title }}</title>
    <meta name="description"
        content="{{ page.description | default: 'Technical surfboard reviews and translations for intermediate surfers.' }}">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="icon" href="/favicon.ico" sizes="32x32">

    <link rel="icon" href="/icon.svg" type="image/svg+xml">

    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>

<body class="{{ page.bg_color | default: 'bg-[#0f0a1a]' }} text-slate-100 font-sans transition-colors duration-200">

    <!-- === CENTRALIZED HEADER === -->
    <!-- We dynamically assign the border color based on the page theme -->
    <header class="py-10 px-6 text-center border-b {{ page.border_color | default: 'border-purple-900/30' }}">
        <h1 class="text-4xl font-black tracking-tighter uppercase">The Onshore Patrol</h1>

        <!-- Navigation automatically reads the layout's active color or falls back to purple -->
        <nav class="mt-8 flex justify-center gap-6 font-bold uppercase text-sm tracking-widest">
            <a href="/"
                class="{% if page.url == '/' %}text-purple-400 border-b-2 border-purple-400 pb-1{% else %}hover:{{ page.hover_color | default: 'text-purple-400' }} transition{% endif %}">Home</a>
            <a href="/reviews/"
                class="{% if page.url contains '/reviews' %}text-purple-400 border-b-2 border-purple-400 pb-1{% else %}hover:{{ page.hover_color | default: 'text-purple-400' }} transition{% endif %}">Reviews</a>
            <a href="/improving/"
                class="{% if page.url == '/improving/' %}text-purple-400 border-b-2 border-purple-400 pb-1{% else %}hover:{{ page.hover_color | default: 'text-purple-400' }} transition{% endif %}">Improving</a>
            <a href="/quiver/"
                class="{% if page.url == '/quiver/' %}text-purple-400 border-b-2 border-purple-400 pb-1{% else %}hover:{{ page.hover_color | default: 'text-purple-400' }} transition{% endif %}">My
                Quiver</a>
            <a href="/articles/"
                class="{% if page.url == '/articles/' %}text-purple-400 border-b-2 border-purple-400 pb-1{% else %}hover:{{ page.hover_color | default: 'text-purple-400' }} transition{% endif %}">Articles</a>
        </nav>
    </header>

    <!-- === DYNAMIC MAIN WRAPPER === -->
    <main class="{{ page.max_width | default: 'max-w-4xl' }} mx-auto p-6 py-12">
        {{ content }}
    </main>

    <!-- === CENTRALIZED FOOTER === -->
    <footer class="py-10 text-center text-slate-600 text-xs uppercase tracking-widest">
        &copy; 2026 The Onshore Patrol
    </footer>

</body>

</html>
